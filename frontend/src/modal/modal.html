<transition name="modal">
  <div class="modal-mask">
    <div class="modal-wrapper">
      <div class="modal-container" :class="[containerClass, { 'modal-container--flush': flushContainer }]">
        <div class="modal-body" :class="bodyClass">
          <slot name="body">
          </slot>
        </div>
      </div>
    </div>
  </div>
</transition>
