<div class="min-w-0 max-w-full">
  <div class="flex min-w-0 max-w-full items-baseline whitespace-pre-wrap break-words" :style="indentStyle">
    <button
      v-if="showToggle"
      type="button"
      class="w-4 h-4 mr-1 inline-flex items-center justify-center leading-none text-content-tertiary hover:text-content-secondary focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-1 focus-visible:ring-slate-400 cursor-pointer"
      @click.stop="handleToggle"
    >
      {{ isCollapsedNode ? '+' : '-' }}
    </button>
    <span v-else class="w-4 h-4 mr-1 inline-flex items-center justify-center invisible flex-shrink-0"></span>
    <template v-if="hasKey">
      <span class="text-primary">"{{ nodeKey }}"</span><span>: </span>
    </template>
    <template v-if="isComplex">
      <template v-if="hasChildren">
        <span>{{ openingBracket }}</span>
        <span v-if="isCollapsedNode" class="mx-1">…</span>
        <span v-if="isCollapsedNode">{{ closingBracket }}{{ comma }}</span>
      </template>
      <template v-else>
        <span>{{ openingBracket }}{{ closingBracket }}{{ comma }}</span>
      </template>
    </template>
    <template v-else>
      <span
        v-if="shouldShowReferenceLink"
        class="group inline-flex min-w-0 max-w-full items-baseline flex-wrap gap-x-1.5"
      >
        <span
          :class="[...valueClasses, ...stringWrapperClasses, 'underline', 'decoration-dotted', 'underline-offset-2']"
          :style="isStringValue ? { whiteSpace: 'pre-wrap', overflowWrap: 'anywhere' } : {}"
          :title="shouldTruncateString && !isStringExpanded ? value : undefined"
        >
          {{ displayedValue }}
        </span>
        <span class="shrink-0">
          {{ comma }}
        </span>
        <button
          v-if="shouldTruncateString"
          type="button"
          class="inline-flex shrink-0 items-center gap-1 rounded-full border border-edge bg-surface px-2 py-0.5 text-[11px] font-medium text-content-secondary shadow-sm transition-colors hover:bg-muted hover:text-content focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/30"
          :title="stringToggleTitle"
          :aria-expanded="isStringExpanded"
          @click.stop="toggleStringExpansion"
        >
          <span class="leading-none">{{ stringToggleLabel }}</span>
        </button>
        <a
          href="#"
          class="ml-1 shrink-0 text-sm text-primary opacity-0 transition-opacity group-hover:opacity-100 focus:opacity-100"
          @click.stop.prevent="goToReference()"
        >
          View Document
        </a>
      </span>
      <span
        v-else
        class="inline-flex min-w-0 max-w-full items-baseline flex-wrap gap-x-1.5"
      >
        <span
          :class="[...valueClasses, ...stringWrapperClasses]"
          :style="isStringValue ? { whiteSpace: 'pre-wrap', overflowWrap: 'anywhere' } : {}"
          :title="shouldTruncateString && !isStringExpanded ? value : undefined"
        >
          {{ displayedValue }}
        </span>
        <span class="shrink-0">{{ comma }}</span>
        <button
          v-if="shouldTruncateString"
          type="button"
          class="inline-flex shrink-0 items-center gap-1 rounded-full border border-edge bg-surface px-2 py-0.5 text-[11px] font-medium text-content-secondary shadow-sm transition-colors hover:bg-muted hover:text-content focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/30"
          :title="stringToggleTitle"
          :aria-expanded="isStringExpanded"
          @click.stop="toggleStringExpansion"
        >
          <span class="leading-none">{{ stringToggleLabel }}</span>
        </button>
      </span>
    </template>
  </div>
  <template v-if="isComplex && hasChildren && !isCollapsedNode">
    <json-node
      v-for="child in children"
      :key="child.path"
      :node-key="child.displayKey"
      :value="child.value"
      :level="level + 1"
      :is-last="child.isLast"
      :path="child.path"
      :toggle-collapse="toggleCollapse"
      :is-collapsed="isCollapsed"
      :create-child-path="createChildPath"
      :indent-size="indentSize"
      :max-top-level-fields="maxTopLevelFields"
      :top-level-expanded="topLevelExpanded"
      :expand-top-level="expandTopLevel"
      :references="references"
      :max-string-length="maxStringLength"
    ></json-node>
    <div
      v-if="hasHiddenRootChildren"
      class="flex items-baseline whitespace-pre"
      :style="indentStyle"
    >
      <span class="w-4 h-4 mr-1 inline-flex items-center justify-center invisible"></span>
      <button
        type="button"
        class="text-xs inline-flex items-center gap-1 ml-4 text-slate-500 hover:text-slate-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-1 focus-visible:ring-slate-400"
        :title="hiddenChildrenTooltip"
        @click.stop="handleExpandTopLevel"
      >
        <span aria-hidden="true">{{hiddenChildrenLabel}}…</span>
      </button>
    </div>
    <div class="flex items-baseline whitespace-pre" :style="indentStyle">
      <span class="w-4 h-4 mr-1 inline-flex items-center justify-center invisible"></span>
      <span>{{ closingBracket }}{{ comma }}</span>
    </div>
  </template>
</div>
