<div class="relative flex items-start" :class="{'justify-end': message.role === 'user'}">
  <div
    class="min-w-0 max-w-full"
    :class="{'text-right': message.role === 'user'}">

    <div v-if="message.toolCalls && message.toolCalls.length" class="mb-2 text-xs text-gray-500 dark:text-gray-400">
      <div
        v-for="(tc, i) in message.toolCalls"
        :key="i"
        class="flex items-center gap-1.5 py-0.5 font-mono">
        <svg :class="['w-3.5 h-3.5 shrink-0', tc.status === 'running' ? 'animate-spin text-gray-400 dark:text-gray-500' : 'text-gray-500 dark:text-gray-400']" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75a4.5 4.5 0 0 1-4.884 4.484c-1.076-.091-2.264.071-2.95.904l-7.152 8.684a2.548 2.548 0 1 1-3.586-3.586l8.684-7.152c.833-.686.995-1.874.904-2.95a4.5 4.5 0 0 1 6.336-4.486l-3.276 3.276a3.004 3.004 0 0 0 2.25 2.25l3.276-3.276c.256.565.398 1.192.398 1.852Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M4.867 19.125h.008v.008h-.008v-.008Z" /></svg>
        <span>{{ tc.toolName }}</span>
        <span v-if="tc.toolName !== 'typeCheck'" class="text-gray-400 dark:text-gray-500">{{ formatToolInput(tc.input) }}</span>
      </div>
    </div>

    <div class="text-sm text-content rounded-md inline-block relative" :class="styleForMessage">
      <div v-for="part in contentSplitByScripts">
        <div v-if="part.type === 'text'" v-html="marked(part.content)">
        </div>
        <div v-else-if="part.type === 'code'">
          <chat-message-script
            :message="message"
            :script="part.content"
            :language="part.language"
            :target-dashboard-id="targetDashboardId"
            @copyMessage="copyMessage"></chat-message-script>
        </div>
      </div>
    </div>
  </div>
</div>
