<div>
  <custom-date-picker
    v-if="dateSelection == 'picker'"
    :value="value"
    mode="datetime"
    :horizontal="true"
    class="max-w-[420px]"
    @input="$emit('input', $event)"
  />
  <input
    v-if="dateSelection == 'iso'"
    type="text"
    class="w-64 h-8 border border-edge-strong outline-0"
    :value="valueAsISOString"
    @input="updateFromISO">
</div>
