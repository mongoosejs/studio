<form @submit.prevent="emitSearch" class="relative flex-grow m-0">
  <input
    ref="searchInput"
    class="w-full font-mono rounded-md p-1 border border-edge-strong outline-edge-strong text-lg focus:ring-1 focus:ring-primary-subtle focus:ring-offset-0 focus:outline-none"
    type="text"
    placeholder="Filter (supports JS, dates, ObjectIds, and more)"
    v-model="searchText"
    @click="initFilter($event); updateAutocomplete()"
    @input="updateAutocomplete"
    @keyup="onSearchKeyup"
    @keydown="handleKeyDown"
  />
  <div
    v-if="datePickerContext || autocompleteSuggestions.length"
    ref="autocompleteDropdown"
    class="absolute z-[9999] bg-surface border border-edge-strong rounded mt-1 w-full shadow"
  >
    <div
      v-if="datePickerContext && !showDateCalendar"
      class="flex flex-wrap items-center gap-2 px-2 py-1.5 border-b border-edge-strong text-sm"
    >
      <span class="text-content-secondary shrink-0">Date</span>
      <select
        v-model="dateInsertFormat"
        class="text-xs border border-edge rounded-md bg-surface px-2 py-1"
        @mousedown.stop
      >
        <option value="timestamp">Milliseconds</option>
        <option value="quoted">Date string</option>
      </select>
      <button
        type="button"
        class="text-xs font-medium text-teal-700 hover:text-teal-900 px-2 py-1 rounded border border-edge-strong hover:bg-surface-hover"
        @mousedown.prevent
        @click="toggleDateCalendar"
      >Open calendar</button>
    </div>
    <div
      v-if="datePickerContext && showDateCalendar"
      class="px-1 py-1 border-b border-edge-strong"
      @mousedown.stop
    >
      <div class="flex flex-wrap items-center justify-between gap-2 px-1 pb-1">
        <div class="flex items-center gap-2">
          <span class="text-content-secondary text-xs">Date</span>
          <select
            v-model="dateInsertFormat"
            class="text-xs border border-edge rounded-md bg-surface px-2 py-1"
            @mousedown.stop
          >
            <option value="timestamp">Milliseconds</option>
            <option value="quoted">Date string</option>
          </select>
        </div>
        <button
          type="button"
          class="text-xs text-content-secondary hover:text-content-primary"
          @mousedown.prevent
          @click="toggleDateCalendar"
        >Close</button>
      </div>
      <custom-date-picker
        compact
        mini
        :immediate="false"
        mode="datetime"
        :value="datePickerLocalValue"
        @commit="applyDateFromPicker"
      />
    </div>
    <ul v-if="autocompleteSuggestions.length" class="max-h-40 overflow-y-auto">
    <li
      v-for="(suggestion, index) in autocompleteSuggestions"
      :key="suggestion"
      class="px-2 py-1 cursor-pointer"
      :class="{ 'bg-primary-subtle': index === autocompleteIndex }"
      @mousedown.prevent="applySuggestion(index)"
    >
      {{ suggestion }}
    </li>
  </ul>
  </div>
</form>
