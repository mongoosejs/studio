<div
  class="relative flex flex-col w-full h-full min-h-0 bg-page"
  :class="{
    'overflow-hidden h-[calc(100vh-3.5rem)] max-h-[calc(100vh-3.5rem)]': sleuthContext.isCaseReportDetailRoute,
    'flex flex-col min-h-0 h-full overflow-hidden': !sleuthContext.isCaseReportDetailRoute
  }"
>
  <div
    v-if="sleuthContext.savingSummary || sleuthContext.loadingCaseReport"
    class="absolute inset-0 z-30 flex flex-col items-center justify-center gap-3 bg-page/95 px-4 py-8 text-center backdrop-blur-[1px]"
    aria-busy="true"
  >
    <mongoose-loading class="opacity-90" />
    <template v-if="sleuthContext.savingSummary">
      <p class="text-sm font-semibold text-gray-900">Generating AI summary</p>
      <p class="text-xs text-gray-600 max-w-xs leading-snug">
        Producing an AI-enhanced markdown write-up from your saved summary, investigation notes, and document data. This may take a little while.
      </p>
    </template>
    <template v-else>
      <p class="text-sm font-semibold text-gray-900">Loading case report</p>
      <p class="text-xs text-gray-600 max-w-xs leading-snug">Fetching documents and saved notes…</p>
    </template>
  </div>

  <!-- ── Case report detail page ───────────────────────────────────────── -->
  <template v-if="sleuthContext.isCaseReportDetailRoute">
    <div class="flex flex-col flex-1 min-h-0 overflow-hidden gap-4 mx-auto w-full max-w-6xl px-4 sm:px-6 lg:px-8 py-4">
      <!-- Page header -->
      <div class="flex flex-wrap items-center justify-between gap-3 shrink-0">
        <div class="min-w-0 flex items-center gap-3">
          <router-link
            to="/case-reports"
            class="inline-flex items-center gap-1 text-sm font-medium text-primary hover:underline shrink-0"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 -960 960 960" fill="currentColor"><path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/></svg>
            Case reports
          </router-link>
          <h1 class="text-lg font-bold text-gray-900 truncate">
            {{ sleuthContext.currentCaseReportName || 'Case report' }}
          </h1>
          <span class="text-xs text-gray-500 shrink-0">{{ sleuthContext.selectedDocuments.length }} doc{{ sleuthContext.selectedDocuments.length === 1 ? '' : 's' }}</span>
        </div>
      </div>

      <!-- Main workspace -->
      <div class="flex flex-col flex-1 min-h-0 overflow-hidden gap-4">
        <!-- Documents & notes (primary focus) -->
        <section class="flex flex-col flex-1 min-h-0 rounded-xl border border-edge border-l-[3px] border-l-primary bg-surface shadow-sm overflow-hidden">
          <div class="shrink-0 border-b border-edge bg-gradient-to-b from-primary-subtle/40 to-surface px-5 py-4">
            <div class="flex flex-wrap items-center justify-between gap-4">
              <div class="min-w-0">
                <h2 class="text-lg font-semibold text-content">Documents &amp; notes</h2>
                <p class="text-sm text-content-secondary mt-1">
                  {{ sleuthContext.selectedDocuments.length }} document{{ sleuthContext.selectedDocuments.length === 1 ? '' : 's' }} · review data and write investigation notes
                </p>
              </div>
              <div class="flex flex-wrap items-center gap-2 shrink-0">
                <button
                  type="button"
                  class="inline-flex items-center gap-1.5 rounded-md border border-edge-strong bg-surface px-2.5 py-1.5 text-xs font-medium text-content-secondary shadow-sm hover:bg-muted hover:text-content transition-colors"
                  @click="openAddDocumentsModal"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-primary" viewBox="0 -960 960 960" fill="currentColor"><path d="M440-440H200v-80h240v-80h80v80h240v80H520v80h-80v-80Zm40 320q-75 0-140.5-28.5t-114-77q-48.5-48.5-77-114T120-440q0-75 28.5-140.5t77-114q48.5-48.5 114-77T480-800q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-440q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-120Z"/></svg>
                  Add documents
                </button>
                <span class="isolate inline-flex rounded-md shadow-sm">
                  <button
                    type="button"
                    class="relative inline-flex rounded-l-md px-2.5 py-1.5 text-[11px] font-medium ring-1 ring-inset ring-edge hover:bg-muted"
                    :class="investigationViewMode === 'list' ? 'bg-muted text-content' : 'bg-surface text-content-secondary'"
                    @click="setInvestigationViewMode('list')"
                  >List</button>
                  <button
                    type="button"
                    class="relative -ml-px inline-flex rounded-r-md px-2.5 py-1.5 text-[11px] font-medium ring-1 ring-inset ring-edge hover:bg-muted"
                    :class="investigationViewMode === 'compare' ? 'bg-muted text-content' : 'bg-surface text-content-secondary'"
                    @click="openCompareView"
                  >Compare<span v-if="compareDocumentKeys.length" class="ml-1 opacity-70">({{ compareDocumentKeys.length }})</span></button>
                </span>
                <span class="isolate inline-flex rounded-md shadow-sm">
                  <button
                    type="button"
                    class="relative inline-flex rounded-l-md px-2.5 py-1.5 text-[11px] font-medium ring-1 ring-inset ring-edge hover:bg-muted"
                    :class="investigationDisplayType === 'table' ? 'bg-muted text-content' : 'bg-surface text-content-secondary'"
                    @click="setInvestigationDisplayType('table')"
                  >Table</button>
                  <button
                    type="button"
                    class="relative -ml-px inline-flex rounded-r-md px-2.5 py-1.5 text-[11px] font-medium ring-1 ring-inset ring-edge hover:bg-muted"
                    :class="investigationDisplayType === 'json' ? 'bg-muted text-content' : 'bg-surface text-content-secondary'"
                    @click="setInvestigationDisplayType('json')"
                  >JSON</button>
                </span>
                <div
                  v-if="sleuthContext.investigationModelNames.length"
                  class="relative"
                  ref="investigationSettingsMenu"
                  @keyup.esc.prevent="closeInvestigationSettingsMenu"
                >
                  <button
                    type="button"
                    aria-label="Display settings"
                    class="rounded-md bg-surface px-2 py-1.5 text-content-tertiary shadow-sm ring-1 ring-inset ring-edge hover:bg-muted hover:text-content"
                    @click.stop="toggleInvestigationSettingsMenu"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Zm0 6a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Zm0 6a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
                    </svg>
                  </button>
                  <div
                    v-if="showInvestigationSettingsMenu"
                    class="absolute right-0 z-50 mt-1 w-[min(22rem,calc(100vw-2rem))] max-h-[min(28rem,70vh)] overflow-y-auto rounded-md border border-edge bg-surface p-3 shadow-lg"
                    @click.stop
                  >
                    <p class="text-xs font-semibold text-content mb-2">Display settings</p>
                    <div class="space-y-3">
                      <div
                        v-for="model in sleuthContext.investigationModelNames"
                        :key="'cr-settings-' + model"
                        class="space-y-2 pb-3 mb-3 border-b border-edge last:border-0 last:pb-0 last:mb-0"
                      >
                        <span class="block text-xs font-semibold text-content truncate" :title="model">{{ model }}</span>
                        <div>
                          <label class="block text-[11px] font-medium text-content-tertiary mb-0.5">Identifier</label>
                          <select
                            class="w-full rounded-md border border-edge-strong bg-surface px-2 py-1 text-xs text-content"
                            :value="sleuthContext.identifierPathByModel[model] || ''"
                            @change="sleuthContext.setIdentifierPathForModel(model, $event.target.value)"
                          >
                            <option value="">Auto</option>
                            <option
                              v-for="opt in sleuthContext.getIdentifierFieldOptions(model)"
                              :key="model + ':' + opt.path"
                              :value="opt.path"
                            >
                              {{ opt.path }} ({{ opt.instance }})
                            </option>
                          </select>
                        </div>
                        <div>
                          <div class="flex items-center justify-between gap-2 mb-0.5">
                            <label class="text-[11px] font-medium text-content-tertiary">Projection</label>
                            <button
                              v-if="sleuthContext.getProjectionTextForModel(model)"
                              type="button"
                              class="rounded border border-edge-strong bg-surface px-1.5 py-0.5 text-[10px] font-medium text-content-secondary hover:bg-muted"
                              @click="sleuthContext.clearProjectionForModel(model)"
                            >
                              Clear
                            </button>
                          </div>
                          <projection-search
                            :value="sleuthContext.getProjectionTextForModel(model)"
                            :schema-paths="sleuthContext.getProjectionSchemaPathsForModel(model)"
                            @projection-input="sleuthContext.setProjectionTextForModel(model, $event)"
                          />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div
            v-if="sleuthContext.selectedDocuments.length > 0"
            class="shrink-0 border-b border-edge bg-surface px-5 py-3"
          >
            <div class="flex items-center justify-between gap-2 mb-2.5">
              <p class="text-xs font-semibold text-content-secondary">{{ investigationViewMode === 'compare' ? 'Document columns' : 'Timeline' }}</p>
              <div class="flex items-center gap-2">
                <p class="text-[10px] text-content-tertiary">{{ investigationViewMode === 'compare' ? 'Check to compare · drag to reorder' : 'Drag to reorder · click to jump' }}</p>
                <button
                  v-if="investigationViewMode === 'compare' && compareDocumentKeys.length"
                  type="button"
                  class="text-[10px] font-medium text-content-secondary hover:text-content underline"
                  @click="clearCompareColumns"
                >
                  Clear columns
                </button>
              </div>
            </div>
            <div class="flex items-stretch gap-2 overflow-x-auto pb-1 overscroll-x-contain">
              <div
                v-for="(doc, index) in sleuthContext.selectedDocuments"
                :key="'timeline-' + sleuthContext.getDocumentKey(doc)"
                draggable="true"
                role="button"
                tabindex="0"
                class="group flex shrink-0 items-center gap-2.5 rounded-lg border px-3 py-2.5 text-xs cursor-grab active:cursor-grabbing transition-all select-none"
                :class="{
                  'border-primary bg-primary-subtle/40 ring-1 ring-primary/25 shadow-sm': isTimelineChipHighlighted(doc),
                  'border-edge bg-muted/30 hover:bg-muted/50 hover:border-edge-strong': !isTimelineChipHighlighted(doc),
                  'opacity-40 scale-[0.98]': isTimelineDragging(index),
                  'border-dashed border-primary bg-primary-subtle/20': isTimelineDropTarget(index)
                }"
                @click="scrollToInvestigationDocument(doc)"
                @keydown.enter.prevent="scrollToInvestigationDocument(doc)"
                @dragstart.stop="onTimelineDragStart(index, $event)"
                @dragover.prevent.stop="onTimelineDragOver(index, $event)"
                @dragleave.stop="onTimelineDragLeave"
                @drop.stop="onTimelineDrop(index, $event)"
                @dragend="onTimelineDragEnd"
              >
                <input
                  v-if="investigationViewMode === 'compare'"
                  type="checkbox"
                  class="rounded border-edge-strong text-primary focus:ring-primary-subtle shrink-0 cursor-pointer"
                  :checked="isCompareColumn(doc)"
                  :aria-label="'Compare ' + sleuthContext.getTimelineShortLabel(doc)"
                  @click.prevent.stop="toggleCompareColumn(doc, $event)"
                />
                <span
                  class="flex h-7 w-7 items-center justify-center rounded-full text-[11px] font-bold shrink-0"
                  :class="isTimelineChipHighlighted(doc) ? 'bg-primary text-primary-text' : 'bg-surface text-primary ring-1 ring-inset ring-edge'"
                >{{ index + 1 }}</span>
                <div class="min-w-0 max-w-[9rem]">
                  <div class="font-semibold text-content truncate">{{ sleuthContext.getTimelineShortLabel(doc) }}</div>
                  <div class="text-[10px] text-content-tertiary truncate">{{ doc.model }}</div>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-content-tertiary opacity-40 group-hover:opacity-70" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M9 5h2v2H9V5zm0 6h2v2H9v-2zm0 6h2v2H9v-2zm4-12h2v2h-2V5zm0 6h2v2h-2v-2zm0 6h2v2h-2v-2z"/>
                </svg>
              </div>
            </div>
          </div>

          <div
            v-if="investigationViewMode === 'compare'"
            class="flex-1 min-h-0 overflow-auto overscroll-contain p-5 bg-muted/20"
          >
            <div v-if="compareDocuments.length === 0" class="flex flex-col items-center justify-center gap-3 h-full py-16 text-center">
              <p class="text-sm font-semibold text-content">No documents selected for compare</p>
              <p class="text-xs text-content-secondary max-w-sm">Check documents in the column strip above.</p>
            </div>
            <div v-else class="flex items-stretch gap-4 min-w-min pb-1" :class="investigationDisplayType === 'json' ? 'min-h-[min(36rem,calc(100vh-14rem))]' : 'min-h-[min(32rem,calc(100vh-15rem))]'">
              <div
                v-for="(doc, colIndex) in compareDocuments"
                :key="'compare-' + sleuthContext.getDocumentKey(doc)"
                class="flex flex-col shrink-0 rounded-xl border border-edge bg-surface shadow-sm overflow-hidden"
                :class="investigationDisplayType === 'json'
                  ? 'min-w-[26rem] w-[min(40rem,48vw)] h-[min(36rem,calc(100vh-14rem))]'
                  : 'min-w-[18rem] w-[min(26rem,38vw)] h-[min(32rem,calc(100vh-15rem))]'"
              >
                <div class="shrink-0 border-b border-edge bg-muted/40 px-3 py-2.5">
                  <div class="flex items-start justify-between gap-2">
                    <div class="min-w-0">
                      <p class="text-[10px] font-semibold uppercase tracking-wide text-primary">Column {{ colIndex + 1 }}</p>
                      <p class="text-xs font-semibold text-content truncate mt-0.5">{{ sleuthContext.getInvestigationDocumentHeading(doc) }}</p>
                    </div>
                    <div class="flex shrink-0 items-center gap-1">
                      <a
                        :href="sleuthContext.documentHref(doc)"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="inline-flex items-center rounded-md border border-edge-strong bg-surface px-2 py-0.5 text-[10px] font-medium text-primary hover:bg-muted"
                      >Open</a>
                      <button
                        type="button"
                        class="inline-flex items-center justify-center rounded-md border border-edge-strong bg-surface p-1 text-content-tertiary hover:bg-muted"
                        aria-label="Remove from compare"
                        @click="toggleCompareColumn(doc)"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 -960 960 960" fill="currentColor"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                      </button>
                    </div>
                  </div>
                </div>
                <div
                  class="flex flex-1 min-h-0 flex-col divide-edge"
                  :class="investigationDisplayType === 'json' ? '' : 'lg:flex-row lg:divide-x'"
                >
                  <div
                    class="flex-1 min-h-0 overflow-auto p-3 bg-muted/20"
                    :class="investigationDisplayType === 'json' ? 'sleuth-compare-json-scroll min-h-[18rem]' : 'min-h-[10rem] lg:min-h-0'"
                  >
                    <list-json
                      v-if="investigationDisplayType === 'json'"
                      :value="sleuthContext.filterInvestigationDocument(doc)"
                      :references="sleuthContext.getInvestigationReferenceMap(doc)"
                    />
                    <div v-else class="flex flex-col">
                      <div
                        v-for="path in sleuthContext.getInvestigationTablePaths(doc)"
                        :key="path.path"
                        class="py-2 border-b border-edge first:pt-0 last:border-b-0 last:pb-0"
                      >
                        <div class="text-[10px] font-semibold tracking-wide text-content-tertiary font-mono break-all leading-snug mb-0.5" :title="path.path">{{ path.path }}</div>
                        <div class="text-xs text-content min-w-0 break-words [overflow-wrap:anywhere] leading-relaxed">
                          <component
                            :is="sleuthContext.getComponentForPath(path)"
                            :value="sleuthContext.getValueForPath(doc, path.path)"
                            :allude="sleuthContext.getReferenceModel(path)"
                          />
                        </div>
                      </div>
                    </div>
                  </div>
                  <div
                    class="shrink-0 flex flex-col gap-2 p-3 border-edge bg-surface min-h-[9rem]"
                    :class="investigationDisplayType === 'json' ? 'border-t' : 'border-t lg:border-t-0 lg:w-56 xl:w-64 lg:min-h-0'"
                  >
                    <label class="text-[11px] font-semibold text-content-secondary">Notes</label>
                    <textarea
                      class="flex-1 min-h-[7rem] w-full rounded-lg border border-edge-strong bg-surface px-2.5 py-2 text-xs text-content resize-y focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-subtle"
                      :value="sleuthContext.getDocumentNote(doc)"
                      @input="sleuthContext.setDocumentNote(doc, $event.target.value)"
                      placeholder="Notes for this document…"
                    />
                    <async-button
                      type="button"
                      class="self-end rounded-md bg-primary px-2.5 py-1 text-[11px] font-semibold text-primary-text hover:bg-primary-hover disabled:opacity-50"
                      :disabled="!sleuthContext.currentCaseReportId"
                      @click="sleuthContext.saveDocumentNote(doc)"
                    >
                      Save note
                    </async-button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div v-else ref="investigationDocList" class="flex-1 min-h-0 overflow-y-auto overscroll-y-contain p-5 space-y-4 bg-muted/20">
              <div
                v-for="doc in sleuthContext.selectedDocuments"
                :key="sleuthContext.getDocumentKey(doc)"
                :data-doc-key="sleuthContext.getDocumentKey(doc)"
                class="rounded-xl border bg-surface text-sm overflow-hidden shadow-sm transition-shadow"
                :class="sleuthContext.isInvestigationDocumentFocused(doc) ? 'border-primary ring-1 ring-primary/20 shadow-md' : 'border-edge'"
              >
                <div
                  class="flex items-start justify-between gap-3 px-4 py-3 bg-muted/40 cursor-pointer hover:bg-muted/60 transition-colors"
                  :class="sleuthContext.isInvestigationDocPreviewOpen(doc) ? 'border-b border-edge' : ''"
                  role="button"
                  tabindex="0"
                  :aria-expanded="sleuthContext.isInvestigationDocPreviewOpen(doc) ? 'true' : 'false'"
                  @click="sleuthContext.focusInvestigationDocument(doc); sleuthContext.toggleInvestigationDocPreview(doc)"
                  @keydown.enter.prevent="sleuthContext.toggleInvestigationDocPreview(doc)"
                  @keydown.space.prevent="sleuthContext.toggleInvestigationDocPreview(doc)"
                >
                  <div class="flex items-start gap-1.5 flex-1 min-w-0">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="w-4 h-4 shrink-0 text-content-tertiary transition-transform mt-0.5"
                      :class="{ 'rotate-90': sleuthContext.isInvestigationDocPreviewOpen(doc) }"
                      viewBox="0 -960 960 960"
                      fill="currentColor"
                      aria-hidden="true"
                    ><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg>
                    <div class="font-semibold text-content leading-snug min-w-0">{{ sleuthContext.getInvestigationDocumentHeading(doc) }}</div>
                  </div>
                  <div class="flex shrink-0 items-center gap-1" @click.stop>
                    <a
                      :href="sleuthContext.documentHref(doc)"
                      target="_blank"
                      rel="noopener noreferrer"
                      class="inline-flex items-center rounded-md border border-edge-strong bg-surface px-2.5 py-1 text-xs font-medium text-primary hover:bg-muted"
                    >Open</a>
                    <button
                      type="button"
                      class="inline-flex items-center justify-center rounded-md border border-edge-strong bg-surface p-1 text-content-tertiary hover:bg-red-50 hover:text-red-700"
                      aria-label="Remove from case report"
                      @click="sleuthContext.removeSelectedDocument(doc)"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 -960 960 960" fill="currentColor"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                    </button>
                  </div>
                </div>
                <div v-show="sleuthContext.isInvestigationDocPreviewOpen(doc)" class="p-4">
                  <div class="flex flex-col lg:flex-row lg:items-stretch gap-4 lg:gap-5 min-h-[min(22rem,42vh)]">
                    <div class="flex-1 min-h-[14rem] lg:min-h-0 min-w-0 overflow-auto rounded-lg border border-edge bg-muted/30 p-3">
                    <list-json
                      v-if="investigationDisplayType === 'json'"
                      :value="sleuthContext.filterInvestigationDocument(doc)"
                      :references="sleuthContext.getInvestigationReferenceMap(doc)"
                    />
                    <div v-else class="flex flex-col">
                      <div
                        v-for="path in sleuthContext.getInvestigationTablePaths(doc)"
                        :key="path.path"
                        class="py-2.5 border-b border-edge first:pt-0 last:border-b-0 last:pb-0"
                      >
                        <div class="text-[11px] font-semibold tracking-wide text-content-tertiary font-mono break-all leading-snug mb-1" :title="path.path">{{ path.path }}</div>
                        <div class="text-sm text-content min-w-0 break-words [overflow-wrap:anywhere] leading-relaxed">
                          <component
                            :is="sleuthContext.getComponentForPath(path)"
                            :value="sleuthContext.getValueForPath(doc, path.path)"
                            :allude="sleuthContext.getReferenceModel(path)"
                          />
                        </div>
                      </div>
                      <p
                        v-if="sleuthContext.getInvestigationTablePaths(doc).length === 0"
                        class="text-sm text-content-tertiary text-center py-4"
                      >
                        No fields to display. Adjust projection in settings.
                      </p>
                    </div>
                    </div>
                    <div class="shrink-0 flex flex-col gap-2 pt-4 border-t border-edge lg:pt-0 lg:border-t-0 lg:border-l lg:pl-5 lg:w-72 xl:w-80 lg:shrink-0">
                    <label class="text-xs font-semibold text-content-secondary">Notes</label>
                    <textarea
                      class="min-h-[6rem] lg:min-h-0 lg:flex-1 w-full rounded-lg border border-edge-strong bg-surface px-3 py-2.5 text-sm text-content resize-y focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-subtle"
                      :value="sleuthContext.getDocumentNote(doc)"
                      @input="sleuthContext.setDocumentNote(doc, $event.target.value)"
                      placeholder="Notes for this document…"
                    />
                    <async-button
                      type="button"
                      class="self-end rounded-md bg-primary px-3 py-1.5 text-xs font-semibold text-primary-text hover:bg-primary-hover disabled:opacity-50"
                      :disabled="!sleuthContext.currentCaseReportId"
                      @click="sleuthContext.saveDocumentNote(doc)"
                    >
                      Save note
                    </async-button>
                    </div>
                  </div>
                </div>
              </div>
            <div v-if="sleuthContext.selectedDocuments.length === 0" class="flex flex-col items-center justify-center gap-3 py-20 px-4 text-center">
              <div class="flex h-14 w-14 items-center justify-center rounded-xl bg-primary-subtle text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 -960 960 960" fill="currentColor"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm0-80h640v-480H160v480Zm160-240h320v-80H320v80Zm0-160h320v-80H320v80ZM160-240v-480 480Z"/></svg>
              </div>
              <div>

            tabindex="0"
            :aria-expanded="sleuthContext.isInvestigationDocPreviewOpen(doc) ? 'true' : 'false'"
            @click="sleuthContext.focusInvestigationDocument(doc); sleuthContext.toggleInvestigationDocPreview(doc)"
            @keydown.enter.prevent="sleuthContext.toggleInvestigationDocPreview(doc)"
            @keydown.space.prevent="sleuthContext.toggleInvestigationDocPreview(doc)"
          >
            <div class="flex items-start gap-1.5 flex-1 min-w-0">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5 shrink-0 text-gray-400 transition-transform mt-0.5"
                :class="{ 'rotate-90': sleuthContext.isInvestigationDocPreviewOpen(doc) }"
                viewBox="0 -960 960 960"
                fill="currentColor"
                aria-hidden="true"
              ><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg>
              <div class="font-medium text-gray-900 leading-snug min-w-0">{{ sleuthContext.getInvestigationDocumentHeading(doc) }}</div>
            </div>
            <div class="flex shrink-0 items-center gap-1" @click.stop>
              <a
                :href="sleuthContext.documentHref(doc)"
                target="_blank"
                rel="noopener noreferrer"
                class="rounded border border-gray-300 bg-white px-2 py-0.5 text-[11px] font-medium text-primary hover:bg-gray-50"
              >Open</a>
              <button
                type="button"
                class="rounded border border-gray-300 bg-white p-1 text-gray-500 hover:bg-red-50 hover:text-red-700"
                aria-label="Remove from case report"
                @click="sleuthContext.removeSelectedDocument(doc)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 -960 960 960" fill="currentColor"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
              </button>
            </div>
          </div>
          <div v-show="sleuthContext.isInvestigationDocPreviewOpen(doc)" class="p-2.5">
            <div class="flex flex-col gap-3 min-h-[18rem]">
              <div class="flex-[2] min-h-[12rem] overflow-auto rounded-lg border border-gray-100 bg-gray-50 p-2.5">
              <list-json
                v-if="investigationDisplayType === 'json'"
                :value="sleuthContext.filterInvestigationDocument(doc)"
                :references="sleuthContext.getInvestigationReferenceMap(doc)"
              />
              <div v-else class="flex flex-col">
                <div
                  v-for="path in sleuthContext.getInvestigationTablePaths(doc)"
                  :key="path.path"
                  class="py-2 border-b border-gray-100 first:pt-0 last:border-b-0 last:pb-0"
                >
                  <div class="text-[10px] font-semibold tracking-wide text-gray-500 font-mono break-all leading-snug mb-0.5" :title="path.path">{{ path.path }}</div>
                  <div class="text-xs text-gray-900 min-w-0 break-words [overflow-wrap:anywhere] leading-snug">
                    <component
                      :is="sleuthContext.getComponentForPath(path)"
                      :value="sleuthContext.getValueForPath(doc, path.path)"
                      :allude="sleuthContext.getReferenceModel(path)"
                    />
                  </div>
                </div>
                <p
                  v-if="sleuthContext.getInvestigationTablePaths(doc).length === 0"
                  class="text-xs text-gray-500 text-center py-4"
                >
                  No fields to display. Adjust projection in settings.
                </p>
              </div>
              </div>
              <div class="shrink-0 flex flex-col gap-1.5 pt-2 border-t border-gray-100">
              <textarea
                class="min-h-[4rem] w-full rounded border border-gray-300 px-2 py-1.5 text-xs text-gray-900 resize-y focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
                :value="sleuthContext.getDocumentNote(doc)"
                @input="sleuthContext.setDocumentNote(doc, $event.target.value)"
                placeholder="Notes for this document…"
              />
              <async-button
                type="button"
                class="self-end rounded border border-gray-300 bg-white px-2.5 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50"
                :disabled="!sleuthContext.currentCaseReportId"
                @click="sleuthContext.saveDocumentNote(doc)"
              >
                Save
              </async-button>
              </div>
            </div>
          </div>
        </div>
        <p v-if="sleuthContext.selectedDocuments.length === 0" class="text-xs text-gray-500 text-center py-8">
          <template v-if="sleuthContext.hasSourceFromModelsView">
            Select documents in the main list, then use <span class="font-medium">Add to Sleuth</span>.
          </template>
          <template v-else>
            Open a case report or add documents to begin investigating.
          </template>
        </p>
      </div>
    </div>
  </template>
  <modal v-if="sleuthContext.shouldShowCaseReportModal">
    <template v-slot:body>
      <div class="modal-exit" @click="sleuthContext.shouldShowCaseReportModal = false">&times;</div>
      <div class="text-xl font-bold mb-4">Save Case Report</div>
      <div class="mb-4">
        <label for="caseReportName" class="block text-sm font-medium text-gray-700 mb-2">Case Report Name</label>
        <input
          id="caseReportName"
          type="text"
          v-model="sleuthContext.caseReportName"
          placeholder="Enter case report name"
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
          @keyup.enter="sleuthContext.saveCaseReport"
        />
      </div>
      <div class="flex gap-4 justify-end">
        <button type="button" class="rounded bg-gray-400 px-4 py-2 text-sm font-semibold text-white hover:bg-gray-500" @click="sleuthContext.shouldShowCaseReportModal = false">Cancel</button>
        <async-button type="button" class="rounded bg-primary px-4 py-2 text-sm font-semibold text-primary-text hover:bg-primary-hover" @click="sleuthContext.saveCaseReport">Save</async-button>
      </div>
    </template>
  </modal>

</div>
