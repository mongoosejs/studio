<div class="case-reports-page mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
  <div v-if="status === 'loading'" class="flex flex-col items-center justify-center gap-3 py-24 text-content-tertiary">
    <svg
      class="w-9 h-9 animate-spin text-primary"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
    >
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
    </svg>
    <p class="text-sm font-medium">Loading case reports…</p>
  </div>

  <template v-else>
    <header class="case-reports-hero rounded-xl border border-edge bg-surface px-4 py-5 sm:px-6 sm:py-6 shadow-sm mb-6">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
        <div class="min-w-0">
          <div class="flex items-center gap-2.5 mb-2">
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-primary-subtle text-primary shrink-0" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 -960 960 960" fill="currentColor"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm0-80h640v-480H160v480Zm160-240h320v-80H320v80Zm0-160h320v-80H320v80ZM160-240v-480 480Z"/></svg>
            </span>
            <p class="text-[11px] font-semibold uppercase tracking-wider text-primary">Sleuth investigations</p>
          </div>
          <h1 class="text-2xl sm:text-3xl font-bold text-content tracking-tight">Case reports</h1>
          <p class="mt-1.5 text-sm text-content-secondary max-w-xl leading-relaxed">
            Saved investigations with attached documents, per-document notes, and AI-generated summaries.
          </p>
        </div>
        <router-link
          to="/"
          class="inline-flex shrink-0 items-center justify-center gap-2 rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-primary-text shadow-sm hover:bg-primary-hover focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 -960 960 960" fill="currentColor"><path d="M440-440H200v-80h240v-80h80v80h240v80H520v80h-80v-80Zm40 320q-75 0-140.5-28.5t-114-77q-48.5-48.5-77-114T120-440q0-75 28.5-140.5t77-114q48.5-48.5 114-77T480-800q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-440q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-120Z"/></svg>
          New from Documents
        </router-link>
      </div>

      <div v-if="caseReports.length > 0" class="mt-5 grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div class="case-reports-stat rounded-lg border border-edge/80 px-3 py-2.5">
          <p class="text-[11px] font-medium uppercase tracking-wide text-content-tertiary">Reports</p>
          <p class="text-2xl font-bold text-content tabular-nums">{{ caseReports.length }}</p>
        </div>
        <div class="case-reports-stat rounded-lg border border-edge/80 px-3 py-2.5">
          <p class="text-[11px] font-medium uppercase tracking-wide text-content-tertiary">Documents tracked</p>
          <p class="text-2xl font-bold text-content tabular-nums">{{ totalDocuments }}</p>
        </div>
        <div class="case-reports-stat rounded-lg border border-edge/80 px-3 py-2.5">
          <p class="text-[11px] font-medium uppercase tracking-wide text-content-tertiary">With summary</p>
          <p class="text-2xl font-bold text-content tabular-nums">{{ reportsWithSummary }}</p>
        </div>
      </div>
    </header>

    <div v-if="caseReports.length === 0" class="rounded-xl border border-dashed border-edge bg-surface px-6 py-14 text-center shadow-sm">
      <div class="case-reports-empty-icon mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 -960 960 960" fill="currentColor"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm0-80h640v-480H160v480Zm160-240h320v-80H320v80Zm0-160h320v-80H320v80ZM160-240v-480 480Z"/></svg>
      </div>
      <h2 class="text-lg font-semibold text-content">No case reports yet</h2>
      <p class="mt-2 text-sm text-content-secondary max-w-md mx-auto leading-relaxed">
        Select documents in the Sleuth panel, add investigation notes, and save your first case report.
      </p>
      <router-link
        to="/"
        class="mt-6 inline-flex items-center gap-2 rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-primary-text shadow-sm hover:bg-primary-hover transition-colors"
      >
        Go to Documents
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 -960 960 960" fill="currentColor"><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg>
      </router-link>
    </div>

    <ul v-else class="grid grid-cols-1 md:grid-cols-2 gap-4 list-none p-0 m-0">
      <li v-for="caseReport in caseReports" :key="caseReport._id">
        <router-link
          :to="'/case-reports/' + caseReport._id"
          class="case-reports-card group flex h-full flex-col rounded-xl border border-edge bg-surface p-4 shadow-sm no-underline"
        >
          <div class="flex items-start gap-3 min-w-0">
            <span class="case-reports-card-icon flex h-10 w-10 shrink-0 items-center justify-center rounded-lg ring-1 ring-edge" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 -960 960 960" fill="currentColor"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm0-80h640v-480H160v480Zm160-240h320v-80H320v80Zm0-160h320v-80H320v80ZM160-240v-480 480Z"/></svg>
            </span>
            <div class="min-w-0 flex-1">
              <h2 class="text-base font-semibold text-content truncate group-hover:text-primary transition-colors">{{ caseReport.name }}</h2>
              <p class="mt-0.5 text-xs text-content-tertiary" :title="formatDate(caseReport.createdAt)">
                {{ formatRelativeDate(caseReport.createdAt) }}
              </p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-content-tertiary opacity-0 -translate-x-1 transition-all group-hover:opacity-100 group-hover:translate-x-0 group-hover:text-primary mt-1" viewBox="0 -960 960 960" fill="currentColor"><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg>
          </div>

          <div class="mt-3 flex flex-wrap gap-1.5">
            <span class="inline-flex items-center rounded-full bg-muted px-2 py-0.5 text-[11px] font-medium text-content-secondary">
              {{ getDocumentCount(caseReport) }} doc{{ getDocumentCount(caseReport) === 1 ? '' : 's' }}
            </span>
            <span
              v-if="getNotesCount(caseReport) > 0"
              class="inline-flex items-center rounded-full bg-primary-subtle px-2 py-0.5 text-[11px] font-medium text-primary"
            >
              {{ getNotesCount(caseReport) }} note{{ getNotesCount(caseReport) === 1 ? '' : 's' }}
            </span>
            <span
              v-if="hasSummary(caseReport)"
              class="inline-flex items-center rounded-full bg-blue-50 px-2 py-0.5 text-[11px] font-medium text-blue-800"
            >
              Summary
            </span>
            <span
              v-if="hasAiSummary(caseReport)"
              class="inline-flex items-center rounded-full bg-violet-50 px-2 py-0.5 text-[11px] font-medium text-violet-800"
            >
              AI summary
            </span>
          </div>

          <p
            v-if="getReportPreview(caseReport)"
            class="case-reports-preview mt-3 text-xs text-content-secondary leading-relaxed"
          >
            {{ getReportPreview(caseReport) }}
          </p>
          <p v-else class="mt-3 text-xs text-content-tertiary italic">No summary yet</p>

          <span class="mt-4 inline-flex items-center text-xs font-semibold text-primary">
            Open report
            <svg xmlns="http://www.w3.org/2000/svg" class="ml-1 h-3.5 w-3.5 transition-transform group-hover:translate-x-0.5" viewBox="0 -960 960 960" fill="currentColor"><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg>
          </span>
        </router-link>
      </li>
    </ul>
  </template>
</div>
