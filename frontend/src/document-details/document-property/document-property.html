<div class="border border-edge bg-surface rounded-lg mb-2" style="overflow: visible;">
  <!-- Collapsible Header -->
  <div
    @click="toggleCollapse"
    class="p-1 cursor-pointer flex items-center justify-between border-b border-edge bg-slate-100 hover:bg-muted transition-colors duration-200 ease-in-out"
    style="overflow: visible; position: relative;"
  >
    <div class="flex items-center" >
      <svg
        :class="isCollapsed ? 'rotate-0' : 'rotate-90'"
        class="w-4 h-4 text-content-tertiary mr-2 transition-transform duration-200"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
      </svg>
      <span class="font-medium text-content">
        <span
          v-for="(part, index) in pathNameParts"
          :key="index"
          :class="{ 'font-bold': part.matched }">{{ part.text }}</span>
      </span>
      <span class="ml-2 text-sm text-content-tertiary">({{(path.instance || 'unknown').toLowerCase()}})</span>
      <div v-if="path.instance === 'Array' && canUseArrayTableView" class="ml-3 inline-flex items-center rounded-full bg-gray-200 p-0.5 text-xs font-semibold">
        <button
          type="button"
          class="rounded-full px-2.5 py-0.5 transition"
          :class="arrayDetailViewMode === 'list' ? 'bg-merlot-700 text-white shadow' : 'text-content-secondary hover:text-content'"
          @click.stop="setArrayDetailViewMode('list')">
          List
        </button>
        <button
          type="button"
          class="rounded-full px-2.5 py-0.5 transition"
          :class="arrayDetailViewMode === 'table' ? 'bg-merlot-700 text-white shadow' : 'text-content-secondary hover:text-content'"
          @click.stop="setArrayDetailViewMode('table')">
          Table
        </button>
      </div>
      <div v-if="isGeoJsonGeometry" class="ml-3 inline-flex items-center gap-2">
        <div class="inline-flex items-center rounded-full bg-gray-200 p-0.5 text-xs font-semibold">
          <button
            type="button"
            class="rounded-full px-2.5 py-0.5 transition"
            :class="detailViewMode === 'text' ? 'bg-blue-600 text-white shadow' : 'text-content-secondary hover:text-content'"
            :style="detailViewMode === 'text' ? 'color: white !important; background-color: #2563eb !important;' : ''"
            @click.stop="setDetailViewMode('text')">
            Text
          </button>
          <button
            type="button"
            class="rounded-full px-2.5 py-0.5 transition"
            :class="detailViewMode === 'map' ? 'bg-blue-600 text-white shadow' : 'text-content-secondary hover:text-content'"
            :style="detailViewMode === 'map' ? 'color: white !important; background-color: #2563eb !important;' : ''"
            @click.stop="setDetailViewMode('map')">
            Map
          </button>
        </div>
        <!-- Info icon with tooltip -->
        <div v-if="editting" class="relative inline-block" style="z-index: 10002;" @mouseenter="showTooltip = true" @mouseleave="showTooltip = false" @click.stop>
          <svg
            ref="infoIcon"
            class="w-6 h-6 text-gray-400 hover:text-gray-600 cursor-help"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <div
            v-show="showTooltip"
            ref="tooltip"
            class="absolute left-full top-0 ml-2 w-64 p-3 text-white text-xs rounded-lg shadow-xl"
            style="z-index: 99999; pointer-events: none; white-space: normal; position: fixed; background-color: #111827;"
            :style="getTooltipStyle()"
          >
            <div class="font-semibold mb-2">Map Controls:</div>
            <div v-if="isGeoJsonPoint" class="space-y-1">
              <div>• Drag pin to move location</div>
            </div>
            <div v-else-if="isGeoJsonPolygon" class="space-y-1">
              <div>• Drag vertices to reshape polygon</div>
              <div v-if="isMultiPolygon">• Right-click edge to add new vertex</div>
              <div>• Right-click vertex to delete</div>
            </div>
            <div class="absolute top-2 -left-1 w-0 h-0 border-t-4 border-b-4 border-r-4 border-transparent border-r-gray-900"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <date-view-mode-picker
        v-if="isDatePath"
        :viewMode="dateViewMode"
        :path="path"
        :editting="editting"
        @update:viewMode="dateViewMode = $event"
      ></date-view-mode-picker>
      <objectid-view-mode-picker
        v-if="isObjectIdPath"
        :viewMode="objectIdViewMode"
        @update:viewMode="objectIdViewMode = $event"
      ></objectid-view-mode-picker>
      <button
        type="button"
        class="flex items-center gap-1 text-sm text-gray-600 hover:text-gray-800 px-2 py-1 rounded-md border border-transparent hover:border-edge-strong bg-surface"
        @click.stop.prevent="copyPropertyValue"
        title="Copy value"
        aria-label="Copy property value"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8m-8 4h8m-8 4h5m-7-9a2 2 0 012-2h7a2 2 0 012 2v10a2 2 0 01-2 2H8l-4-4V7a2 2 0 012-2z" />
        </svg>
        {{copyButtonLabel}}
      </button>
      <router-link
        v-if="path.ref && getValueForPath(path.path)"
        :to="`/model/${path.ref}/document/${getValueForPath(path.path)}`"
        class="bg-primary hover:bg-primary-hover text-primary-text px-2 py-1 text-sm rounded-md"
        @click.stop
        >View Document
      </router-link>
    </div>
  </div>

  <!-- Collapsible Content -->
  <div v-if="!isCollapsed" class="p-2">
    <!-- Date Type Selector (when editing dates) -->
    <div v-if="editting && path.instance === 'Date'" class="mb-3 flex gap-1.5">
      <div
        @click="dateType = 'picker'"
        :class="dateType === 'picker' ? 'bg-merlot-700' : ''"
        class="self-stretch px-2 py-1 rounded-sm justify-center items-center gap-1.5 flex cursor-pointer">
        <div
          :class="dateType === 'picker' ? 'text-white' : ''"
          class="text-xs font-medium font-['Lato'] capitalize leading-tight">
          Date Picker
        </div>
      </div>
      <div
        @click="dateType = 'iso'"
        :class="dateType === 'iso' ? 'bg-merlot-700' : ''"
        class="self-stretch px-2 py-1 rounded-sm justify-center items-center gap-1.5 flex cursor-pointer">
        <div
          :class="dateType === 'iso' ? 'text-white' : ''"
          class="text-xs font-medium font-['Lato'] capitalize leading-tight">
          ISO String
        </div>
      </div>
    </div>

    <!-- Field Content -->
    <div v-if="editting && path.path !== '_id'">
      <!-- Use detail-default with map editing for GeoJSON geometries -->
      <component
        v-if="isGeoJsonGeometry"
        :is="getComponentForPath(path)"
        :value="getEditValueForPath(path)"
        :viewMode="detailViewMode"
        :on-change="handleInputChange"
        >
      </component>
      <!-- Use standard edit components for other types -->
      <component
        v-else
        :is="getEditComponentForPath(path)"
        :value="getEditValueForPath(path)"
        :format="dateType"
        v-bind="getEditComponentProps(path)"
        @input="handleInputChange($event)"
        @error="invalid[path.path] = $event;"
        >
      </component>
    </div>
    <div v-else>
      <!-- Arrays own their truncation and array search behavior in detail-array. -->
      <component
        v-if="isArray"
        :is="getComponentForPath(path)"
        :value="rawValue"
        :viewMode="propertyDetailViewMode"
        :truncate="needsTruncation"
        @updated="renderedValue = $event"></component>
      <!-- Non-array truncated view -->
      <div v-else-if="shouldShowTruncated && !isArray" class="relative">
        <div class="text-content-secondary whitespace-pre-wrap break-words font-mono text-sm">{{truncatedString}}</div>
        <button
          @click="toggleValueExpansion"
          class="mt-2 text-merlot-700 hover:text-merlot-900 text-sm font-medium flex items-center gap-1 transform transition-all duration-200 ease-in-out hover:translate-x-0.5"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
          Show more ({{valueAsString.length}} characters)
        </button>
      </div>
      <!-- Expanded view -->
      <div v-else-if="needsTruncation && isValueExpanded" class="relative">
        <component
          :is="getComponentForPath(path)"
          :value="rawValue"
          :viewMode="propertyDetailViewMode"
          @updated="renderedValue = $event"></component>
        <button
          @click="toggleValueExpansion"
          class="mt-2 text-merlot-700 hover:text-merlot-900 text-sm font-medium flex items-center gap-1 transform transition-all duration-200 ease-in-out hover:translate-x-0.5"
        >
          <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
          Show less
        </button>
      </div>
      <!-- Full view (no truncation needed) -->
      <div v-else>
        <component
          :is="getComponentForPath(path)"
          :value="rawValue"
          :viewMode="propertyDetailViewMode"
          @updated="renderedValue = $event"></component>
      </div>
    </div>
  </div>
</div>
