<div class="dashboards bg-gray-50 min-h-[calc(100vh-55px)]">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-lg font-semibold text-gray-900">Dashboards</h1>
      <button
        type="button"
        @click="showCreateDashboardModal = true"
        class="rounded-md bg-merlot-900 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-merlot-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-merlot-800">
        New Dashboard
      </button>
    </div>

    <div v-if="status === 'loading'" class="text-center py-12">
      <svg
        class="inline w-8 h-8 animate-spin text-gray-400"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
    </div>

    <div v-else-if="dashboards.length === 0" class="text-center py-12">
      <h3 class="text-sm font-semibold text-gray-900">No dashboards yet</h3>
      <p class="mt-1 text-sm text-gray-500">Get started by creating a new dashboard.</p>
      <div class="mt-4">
        <button
          type="button"
          @click="showCreateDashboardModal = true"
          class="inline-flex items-center rounded-md bg-merlot-900 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-merlot-800">
          <svg class="-ml-0.5 mr-1.5 h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z" />
          </svg>
          New Dashboard
        </button>
      </div>
    </div>

    <div v-else class="space-y-3">
      <div
        v-for="dashboard in dashboards"
        :key="dashboard._id"
        class="bg-white rounded-lg border border-gray-200 px-5 py-4 flex items-center justify-between hover:border-gray-300 transition-colors"
      >
        <div class="min-w-0 flex-1 mr-4">
          <router-link
            :to="'/dashboard/' + dashboard._id"
            class="text-sm font-semibold text-gray-900 hover:text-merlot-900 block truncate">
            {{ dashboard.title }}
          </router-link>
          <p v-if="dashboard.description" class="mt-0.5 text-sm text-gray-500 truncate">{{ dashboard.description }}</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <router-link
            :to="'/dashboard/' + dashboard._id"
            class="rounded-md bg-merlot-900 px-3 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-merlot-800">
            View
          </router-link>
          <div class="relative" v-click-outside="() => closeMenu(dashboard._id)">
            <button
              type="button"
              @click="toggleMenu(dashboard._id)"
              class="rounded-md bg-white px-2 py-1.5 text-gray-500 ring-1 ring-inset ring-gray-300 hover:bg-gray-50">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm6 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm6 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
              </svg>
            </button>
            <div
              v-if="openMenuId === dashboard._id"
              class="absolute right-0 mt-1 w-36 origin-top-right rounded-md bg-white shadow-lg ring-1 ring-black/5 z-10"
            >
              <div class="py-1">
                <router-link
                  :to="'/dashboard/' + dashboard._id + '?edit=true'"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                  Edit
                </router-link>
                <button
                  @click="showDeleteDashboardModal = dashboard; openMenuId = null"
                  type="button"
                  class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <modal v-if="showCreateDashboardModal">
    <template v-slot:body>
      <div class="modal-exit" @click="showCreateDashboardModal = false;">&times;</div>
      <create-dashboard @close="insertNewDashboard"></create-dashboard>
    </template>
  </modal>

  <modal v-if="showDeleteDashboardModal">
    <template v-slot:body>
      <div class="modal-exit" @click="showDeleteDashboardModal = null;">&times;</div>
      <h2>Are you sure you want to delete "{{showDeleteDashboardModal.title}}"?</h2>
      <div class="flex space-x-2 mt-4">
        <button class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-500 text-sm font-semibold" @click="deleteDashboard(showDeleteDashboardModal)">Yes, delete</button>
        <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-semibold" @click="showDeleteDashboardModal=null;">Cancel</button>
      </div>
    </template>
  </modal>
</div>
